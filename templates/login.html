<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accesso — Assistente Didattico</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0f1b2d;
    --navy-light: #1a2e48;
    --gold: #c9a84c;
    --gold-light: #e8c87a;
    --cream: #f5f0e8;
    --white: #ffffff;
    --error: #e05252;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Pattern di sfondo */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: 
      radial-gradient(circle at 20% 20%, rgba(201,168,76,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(201,168,76,0.06) 0%, transparent 50%),
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 40px,
        rgba(255,255,255,0.01) 40px,
        rgba(255,255,255,0.01) 41px
      );
  }

  /* Decorazioni geometriche */
  .deco {
    position: absolute;
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 50%;
    pointer-events: none;
  }
  .deco-1 { width: 600px; height: 600px; top: -200px; left: -200px; }
  .deco-2 { width: 400px; height: 400px; bottom: -150px; right: -100px; }
  .deco-3 { width: 200px; height: 200px; top: 10%; right: 15%; opacity: 0.5; }

  .login-container {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 440px;
    padding: 20px;
  }

  /* Logo/Brand */
  .brand {
    text-align: center;
    margin-bottom: 40px;
  }

  .brand-icon {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin-bottom: 20px;
    box-shadow: 0 8px 32px rgba(201,168,76,0.3);
  }

  .brand h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--white);
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .brand p {
    font-size: 14px;
    color: rgba(255,255,255,0.45);
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  /* Card login */
  .login-card {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 44px 40px;
    box-shadow: 0 32px 64px rgba(0,0,0,0.4);
  }

  .login-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--white);
    margin-bottom: 8px;
  }

  .login-card .subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 32px;
  }

  .field {
    margin-bottom: 20px;
  }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .field input {
    width: 100%;
    padding: 14px 18px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    transition: all 0.25s;
    outline: none;
  }

  .field input:focus {
    border-color: var(--gold);
    background: rgba(201,168,76,0.06);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
  }

  .field input::placeholder { color: rgba(255,255,255,0.2); }

  .btn-login {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border: none;
    border-radius: 12px;
    color: var(--navy);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.3px;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }

  .btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(201,168,76,0.4);
  }

  .btn-login:active { transform: translateY(0); }

  .btn-login.loading::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.2);
    animation: shimmer 1s infinite;
  }

  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  .error-msg {
    background: rgba(224,82,82,0.1);
    border: 1px solid rgba(224,82,82,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    color: #ff8080;
    font-size: 13px;
    margin-top: 16px;
    display: none;
    text-align: center;
  }

  .error-msg.show { display: block; animation: fadeIn 0.3s; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

  .footer-note {
    text-align: center;
    margin-top: 28px;
    font-size: 12px;
    color: rgba(255,255,255,0.2);
  }

  /* Shake animation per errore */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-8px); }
    40%, 80% { transform: translateX(8px); }
  }
  .shake { animation: shake 0.4s ease; }
</style>
</head>
<body>
<div class="deco deco-1"></div>
<div class="deco deco-2"></div>
<div class="deco deco-3"></div>

<div class="login-container">
  <div class="brand">
    <div class="brand-icon">📚</div>
    <h1>Assistente Didattico</h1>
    <p>Generatore AI di materiali scolastici</p>
  </div>

  <div class="login-card">
    <h2>Benvenuto</h2>
    <p class="subtitle">Inserisci la password per accedere</p>

    <div class="field">
      <label>Password di accesso</label>
      <input type="password" id="password" placeholder="••••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="btnLogin" onclick="doLogin()">
      Accedi all'applicazione
    </button>

    <div class="error-msg" id="errorMsg">
      ⚠️ Password non corretta. Riprova.
    </div>
  </div>

  <p class="footer-note">Prof. A. Giuffrida</p>
</div>

<script>
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const pw = document.getElementById('password').value;
    const btn = document.getElementById('btnLogin');
    const err = document.getElementById('errorMsg');

    if (!pw) return;

    btn.textContent = 'Accesso in corso...';
    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });
      const data = await res.json();

      if (data.success) {
        btn.textContent = '✓ Accesso effettuato!';
        setTimeout(() => window.location.href = '/', 600);
      } else {
        err.classList.add('show');
        document.querySelector('.login-card').classList.add('shake');
        setTimeout(() => document.querySelector('.login-card').classList.remove('shake'), 400);
        btn.textContent = 'Accedi all\'applicazione';
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    } catch(e) {
      err.textContent = '⚠️ Errore di connessione. Riprova.';
      err.classList.add('show');
      btn.textContent = 'Accedi all\'applicazione';
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
